<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#111111"/>
  <defs>
    <pattern id="g3" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(212,160,23,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#g3)"/>
  <!-- Funnel shape -->
  <polygon points="150,80 450,80 380,320 220,320" fill="none" stroke="rgba(220,38,38,0.3)" stroke-width="1"/>
  <!-- Funnel segments -->
  <line x1="170" y1="140" x2="430" y2="140" stroke="rgba(220,38,38,0.15)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="190" y1="200" x2="410" y2="200" stroke="rgba(220,38,38,0.15)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="210" y1="260" x2="390" y2="260" stroke="rgba(220,38,38,0.15)" stroke-width="0.5" stroke-dasharray="4 4"/>
  <!-- Labels -->
  <text x="300" y="118" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="monospace">100 LEADS</text>
  <text x="300" y="175" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" font-family="monospace">34 TRIALS</text>
  <text x="300" y="238" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-family="monospace">12 INTERESTED</text>
  <text x="300" y="300" text-anchor="middle" fill="rgba(220,38,38,0.7)" font-size="14" font-family="monospace" font-weight="bold">4 ENROLLED</text>
  <!-- Leak arrows -->
  <text x="470" y="120" fill="rgba(220,38,38,0.3)" font-size="10" font-family="monospace">→ 66 lost</text>
  <text x="430" y="180" fill="rgba(220,38,38,0.3)" font-size="10" font-family="monospace">→ 22 lost</text>
  <text x="410" y="245" fill="rgba(220,38,38,0.3)" font-size="10" font-family="monospace">→ 8 lost</text>
  <!-- Bottom stat -->
  <text x="300" y="370" text-anchor="middle" fill="rgba(220,38,38,0.5)" font-size="16" font-family="monospace">96% LEAKAGE</text>
</svg>