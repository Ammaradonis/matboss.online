<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#111111"/>
  <defs>
    <pattern id="g2" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(220,38,38,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#g2)"/>
  <!-- Clock face -->
  <circle cx="300" cy="190" r="100" fill="none" stroke="rgba(220,38,38,0.3)" stroke-width="1.5"/>
  <circle cx="300" cy="190" r="95" fill="none" stroke="rgba(220,38,38,0.08)" stroke-width="0.5"/>
  <!-- Hour markers -->
  <line x1="300" y1="95" x2="300" y2="105" stroke="rgba(220,38,38,0.5)" stroke-width="2"/>
  <line x1="395" y1="190" x2="385" y2="190" stroke="rgba(220,38,38,0.5)" stroke-width="2"/>
  <line x1="300" y1="285" x2="300" y2="275" stroke="rgba(220,38,38,0.5)" stroke-width="2"/>
  <line x1="205" y1="190" x2="215" y2="190" stroke="rgba(220,38,38,0.5)" stroke-width="2"/>
  <!-- Hands pointing to 4 o'clock -->
  <line x1="300" y1="190" x2="300" y2="120" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="300" y1="190" x2="360" y2="240" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="300" cy="190" r="4" fill="#dc2626"/>
  <!-- 4HR label -->
  <text x="300" y="340" text-anchor="middle" fill="rgba(220,38,38,0.6)" font-size="28" font-family="monospace" font-weight="bold">4 HOURS</text>
  <text x="300" y="370" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="11" font-family="monospace" letter-spacing="3">CRITICAL WINDOW</text>
</svg>