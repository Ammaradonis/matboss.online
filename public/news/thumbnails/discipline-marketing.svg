<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#111111"/>
  <defs>
    <pattern id="g4" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(220,38,38,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#g4)"/>
  <!-- VS divider -->
  <line x1="300" y1="60" x2="300" y2="340" stroke="rgba(220,38,38,0.2)" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="rgba(220,38,38,0.4)" font-size="24" font-family="monospace" font-weight="bold">VS</text>
  <!-- Left: Systems - ascending line -->
  <text x="150" y="90" text-anchor="middle" fill="rgba(212,160,23,0.6)" font-size="12" font-family="monospace" letter-spacing="2">SYSTEMS</text>
  <polyline points="60,280 120,250 180,210 240,150" stroke="rgba(212,160,23,0.5)" stroke-width="2" fill="none"/>
  <circle cx="240" cy="150" r="4" fill="#d4a017"/>
  <text x="150" y="320" text-anchor="middle" fill="rgba(212,160,23,0.3)" font-size="10" font-family="monospace">COMPOUNDS</text>
  <!-- Right: Marketing - flat then declining -->
  <text x="450" y="90" text-anchor="middle" fill="rgba(220,38,38,0.5)" font-size="12" font-family="monospace" letter-spacing="2">MARKETING</text>
  <polyline points="360,200 420,190 480,200 540,250" stroke="rgba(220,38,38,0.4)" stroke-width="2" fill="none"/>
  <circle cx="540" cy="250" r="4" fill="#dc2626"/>
  <text x="450" y="320" text-anchor="middle" fill="rgba(220,38,38,0.3)" font-size="10" font-family="monospace">DEPRECIATES</text>
  <!-- Bottom -->
  <text x="300" y="375" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-size="10" font-family="monospace" letter-spacing="3">$2.3B INDUSTRY AD SPEND</text>
</svg>